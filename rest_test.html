<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Firebase REST API Test</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
        button { padding: 10px 20px; font-size: 16px; margin: 10px 0; cursor: pointer; }
        .log { padding: 10px; margin: 10px 0; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
    </style>
</head>
<body>
    <h1>Firebase REST API Test</h1>
    <p>使用 REST API 直接访问 Realtime Database</p>
    
    <button onclick="testWrite()">测试写入</button>
    <button onclick="testRead()">测试读取</button>
    
    <div id="logs"></div>
    
    <script>
        const DB_URL = "https://nana01-9a9ee-default-rtdb.asia-southeast1.firebasedatabase.app";
        
        function log(msg, type = 'info') {
            const div = document.createElement('div');
            div.className = 'log ' + type;
            div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            document.getElementById('logs').appendChild(div);
        }
        
        async function testWrite() {
            log("Testing WRITE via REST API...", 'info');
            try {
                const response = await fetch(`${DB_URL}/test-rest.json`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        timestamp: Date.now(),
                        message: "Hello from REST API",
                        source: "browser"
                    })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    log("✅ WRITE SUCCESS! Response: " + JSON.stringify(data), 'success');
                } else {
                    log("❌ WRITE FAILED: HTTP " + response.status, 'error');
                }
            } catch (e) {
                log("❌ WRITE ERROR: " + e.message, 'error');
            }
        }
        
        async function testRead() {
            log("Testing READ via REST API...", 'info');
            try {
                const response = await fetch(`${DB_URL}/test-rest.json`);
                
                if (response.ok) {
                    const data = await response.json();
                    log("✅ READ SUCCESS! Data: " + JSON.stringify(data), 'success');
                } else {
                    log("❌ READ FAILED: HTTP " + response.status, 'error');
                }
            } catch (e) {
                log("❌ READ ERROR: " + e.message, 'error');
            }
        }
        
        // Auto test on load
        window.onload = () => {
            log("Page loaded. Click buttons to test.", 'info');
        };
    </script>
</body>
</html>
