    <style>
        body {
            font-family: 'Segoe UI', sans-serif;

        }

            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h1 { color: #667eea; }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1em;
            border-radius: 25px;
            cursor: pointer;
            margin: 10px 5px;
        }
        .btn:hover { opacity: 0.9; }
        .btn-success { background: #28a745; }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            background: #f8f9fa;

        }

            height: 100%;

        }

</head>
<body>

        <div style="margin: 20px 0;">

            <button class="btn btn-success" onclick="checkDatabase()">🔍 检查数据库状态</button>

            <li>等待上传完成（约 60 道题目）</li>
            <li>上传成功后，刷新主游戏页面即可</li>

        <h3>⚠️ 注意事项</h3>

            <li>上传完成后，请将数据库规则改回只读</li>
        </ul>
    </div>

            {question: "玩家最多可以随身携带多少只帕鲁？", options: ["3", "5", "6", "10"], correct: 1},
            {question: "新叶猿没有哪项工作技能", options: ["浇水", "采集", "手工作业", "采伐"], correct: 0},
            {question: "游戏中帕鲁球的种类", options: ["6", "7", "8", "9"], correct: 1},
            {question: "帕鲁工作适应性等级最高是多少级", options: ["4", "5", "6", "7"], correct: 0}
        ];
        
        async function uploadQuestions() {
            const status = document.getElementById('status');
            const progress = document.getElementById('progress');
            const progressBar = document.getElementById('progressBar');
            
            status.style.display = 'block';
            progress.style.display = 'block';
            status.className = 'status';
            status.textContent = '准备上传...';
            
            try {
                // 准备数据
                const questionsData = {};
                const answersData = {};
                
                QUESTIONS.forEach((q, index) => {
                    questionsData[index] = {
                        question: q.question,
                        options: q.options
                    };
                    answersData[index] = {
                        correct: q.correct
                    };
                });
                
                // 上传题目
                status.textContent = '正在上传题目...';
                await db.ref('/questions').set(questionsData);
                progressBar.style.width = '50%';
                
                // 上传答案
                status.textContent = '正在上传答案...';
                await db.ref('/answers').set(answersData);
                progressBar.style.width = '100%';
                
                // 上传配置
                await db.ref('/config').set({
                    totalQuestions: QUESTIONS.length,
                    version: '3.0',
                    updatedAt: Date.now()
                });
                
                status.className = 'status success';
                status.innerHTML = `✅ 上传成功！<br>已上传 ${QUESTIONS.length} 道题目<br><br>现在可以刷新主游戏页面开始答题了。`;
                
            } catch (error) {
                console.error(error);
                status.className = 'status error';
                status.innerHTML = `❌ 上传失败<br>错误：${error.message}<br><br>可能原因：<br>1. Firebase 数据库规则不允许写入<br>2. 网络连接问题`;
            }
        }
        
        async function checkDatabase() {
            const status = document.getElementById('status');
            status.style.display = 'block';
            status.className = 'status';
            status.textContent = '检查中...';
            
            try {
                const qSnap = await db.ref('/questions').once('value');
                const aSnap = await db.ref('/answers').once('value');
                const cSnap = await db.ref('/config').once('value');
                
                const qCount = qSnap.exists() ? Object.keys(qSnap.val()).length : 0;
                const aCount = aSnap.exists() ? Object.keys(aSnap.val()).length : 0;
                const config = cSnap.val();
                
                status.className = 'status success';
                status.innerHTML = `📊 数据库状态<br><br>
                    题目数量：${qCount} 道<br>
                    答案数量：${aCount} 个<br>
                    配置版本：${config?.version || '未设置'}<br>
                    最后更新：${config?.updatedAt ? new Date(config.updatedAt).toLocaleString() : '未设置'}`;
                
            } catch (error) {
                status.className = 'status error';
                status.innerHTML = `❌ 检查失败<br>错误：${error.message}`;
            }
        }
    </script>
</body>
</html>
